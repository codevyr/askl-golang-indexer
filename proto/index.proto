syntax = "proto3";
package askl.index;

option go_package = "github.com/planetA/askl-golang-indexer/pkg/indexpb;indexpb";

message Project {
  string project_name = 1;
  string root_path = 2;
  reserved 3;  // was modules - now symbols are project-level
  repeated Object objects = 4;
  repeated Symbol symbols = 5;  // All symbols including modules
}

// Module message removed - modules are now symbols with type=MODULE

message Object {
  int64 local_id = 1;           // Unique within project
  reserved 2;                   // was module_id - removed
  string module_path = 3;
  string filesystem_path = 4;   // Metadata only, never used for filesystem access
  string filetype = 5;
  bytes content = 6;            // Object content (content_hash computed server-side)
  repeated SymbolInstance symbol_instances = 7;  // Symbol instances in this object
  repeated SymbolRef refs = 8;  // References from this object
}

message Symbol {
  int64 local_id = 1;           // Unique within project
  string name = 2;
  SymbolScope scope = 3;
  SymbolType type = 4;          // Function, File, Module, or Directory
}

message SymbolInstance {
  int64 symbol_local_id = 1;    // References Symbol.local_id
  reserved 2;                   // was symbol_type (now on Symbol)
  int32 start_offset = 3;
  int32 end_offset = 4;
}

message SymbolRef {
  int64 to_symbol_local_id = 1; // References Symbol.local_id (unique within project)
  int32 from_offset_start = 2;
  int32 from_offset_end = 3;
}

enum SymbolScope {
  SYMBOL_SCOPE_UNSPECIFIED = 0;
  LOCAL = 1;
  GLOBAL = 2;
}

enum SymbolType {
  SYMBOL_TYPE_UNSPECIFIED = 0;
  FUNCTION = 1;
  FILE = 2;
  MODULE = 3;
  DIRECTORY = 4;
  TYPE = 5;
  DATA = 6;
  MACRO = 7;
}
